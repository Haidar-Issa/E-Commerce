spring.application.name=Test
spring.datasource.url=jdbc:mysql://localhost:3306/e_commerce
spring.datasource.username=root
spring.datasource.password=123456
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
#Jwt Secret
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
#Stripe Keys
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY}
stripe.webhook-key=${STRIPE_WEBHOOK_KEY}
#spring.ai.openai.audio.enabled=false
spring.ai.openai.api-key=${OPENAI_API_KEY}
stripe.api.key=mock-stripe-key
spring.mongodb.uri=mongodb://localhost:27017/test
spring.rabbitmq.host=localhost
#Email-config
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
#enable Authentication for email & password app
spring.mail.properties.mail.smtp.auth=true
#enable-encode protocol
spring.mail.properties.mail.smtp.starttls.enable=true





